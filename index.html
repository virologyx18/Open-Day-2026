    <style>

        h1 { 
            color: #e0e0e0; font-size: 22px; text-align: left; margin: 0 0 20px 0; 
            font-weight: 600; letter-spacing: 3px; text-transform: uppercase;

        /* BUTTON AT TOP */
        #scan-btn {
            padding: 15px; font-size: 14px; font-weight: 700; margin-bottom: 25px; flex-shrink: 0;

        #scan-btn:hover { background: #0066cc; transform: translateY(-1px); }

        .control-group { margin-bottom: 20px; position: relative; flex-shrink: 0; }

        select {
            width: 100%; padding: 10px 0; background: transparent; color: #fff; 
            border: none; border-bottom: 1px solid #444; font-size: 15px; 
            font-family: inherit; cursor: pointer; transition: 0.3s;
        }
        select:focus { outline: none; border-bottom-color: #fff; }
        select option { background: #111; color: #fff; padding: 10px; }

        /* VAULT */
        #vault-panel {
            position: absolute; top: 0; right: 0; width: 260px; height: 100%;
            background: rgba(10, 10, 12, 0.6); border-left: 1px solid #222;
            padding: 30px 20px; overflow-y: auto; pointer-events: none;

        #vault-panel * { pointer-events: auto; }
        #vault-title { color: #444; font-size: 10px; font-weight: bold; letter-spacing: 2px; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 5px; }

            padding: 12px; margin-bottom: 5px; border-radius: 4px;
            cursor: pointer; transition: 0.2s; border: 1px solid transparent; background: rgba(255,255,255,0.02);
        }
        .vault-item:hover { background: rgba(255,255,255,0.08); border-color: #333; }
        .v-name { color: #ddd; font-size: 13px; font-weight: 600; }
        .v-meta { color: #666; font-size: 10px; text-transform: uppercase; margin-top: 3px; }

        /* MODAL */
        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 100;
            justify-content: center; align-items: center; backdrop-filter: blur(8px);
        }
        #result-box {
            width: 650px; background: #08080a; border: 1px solid #333;
            padding: 50px; position: relative; border-radius: 4px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.9);
            max-height: 90vh; overflow-y: auto;
        }
        #res-status { font-size: 11px; letter-spacing: 3px; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; color: #555; display: flex; align-items: center; gap: 10px; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .dot-match { background: #0088ff; box-shadow: 0 0 10px #0088ff; }
        .dot-new { background: #ffaa00; box-shadow: 0 0 10px #ffaa00; }
        #res-title { font-size: 42px; color: #fff; margin: 0 0 20px 0; font-weight: 300; letter-spacing: -1px; }
        #res-desc { color: #999; font-size: 15px; line-height: 1.7; margin-bottom: 30px; font-weight: 300; border-left: 2px solid #333; padding-left: 20px; }

        /* RISK METER */
        #risk-container { background: #0e0e10; padding: 20px; border-radius: 4px; margin-bottom: 25px; border: 1px solid #222; }
        .risk-row { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: flex-end; }

        /* FORM & BUTTONS */
        #discovery-form { display: none; margin-top: 20px; border-top: 1px solid #222; padding-top: 20px; }

        #instructions { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: #444; font-size: 11px; letter-spacing: 2px; pointer-events: none; }

        </div>

    <script type="module">

        // --- DATABASE ---
        const VIRUS_DB = [

            { trans: "air", shape: "bullet", env: "naked", genome: "rna", name: "Orchid Fleck Virus", desc: "A plant rhabdovirus causing necrotic spots on orchids." },
            { trans: "air", shape: "filament", env: "naked", genome: "dna", name: "Rudivirus", desc: "Infects archaea in high-temperature volcanic vents. Extremely stable." },
            { trans: "vector", shape: "icosa", env: "enveloped", genome: "rna", name: "Zika Virus", desc: "A flavivirus linked to microcephaly in infants. Mosquito-borne." },
            { trans: "vector", shape: "icosa", env: "naked", genome: "rna", name: "Colorado Tick Fever", desc: "A reovirus transmitted by wood ticks in mountainous regions." },
            { trans: "vector", shape: "icosa", env: "enveloped", genome: "dna", name: "African Swine Fever", desc: "A giant DNA virus spread by soft ticks to pigs. Highly lethal to swine." },
            { trans: "vector", shape: "helical", env: "enveloped", genome: "rna", name: "Rift Valley Fever", desc: "A phlebovirus affecting livestock and humans. Transmitted by mosquitoes." },
            { trans: "vector", shape: "bullet", env: "enveloped", genome: "rna", name: "Chandipura Virus", desc: "A rhabdovirus transmitted by sandflies. Causes severe encephalitis." },
            { trans: "vector", shape: "complex", env: "enveloped", genome: "dna", name: "Entomopoxvirus", desc: "A poxvirus that specifically infects insects." },
            { trans: "vector", shape: "filament", env: "enveloped", genome: "rna", name: "Hartmannella Virus", desc: "A giant virus carried by amoeba vectors." },
            { trans: "vector", shape: "helical", env: "naked", genome: "rna", name: "Tobacco Rattle", desc: "A plant virus transmitted by soil nematodes (worms)." },
            { trans: "vector", shape: "icosa", env: "naked", genome: "dna", name: "Densonucleosis", desc: "A parvovirus that infects mosquitoes themselves." },
            { trans: "vector", shape: "bullet", env: "naked", genome: "rna", name: "Lettuce Necrotic", desc: "A plant rhabdovirus spread by aphids." },
            { trans: "vector", shape: "complex", env: "naked", genome: "dna", name: "Wolbachia Phage", desc: "Infects Wolbachia bacteria living inside insect hosts." },
            { trans: "vector", shape: "filament", env: "naked", genome: "dna", name: "Insect Iridovirus", desc: "Causes infected insect larvae to turn an iridescent blue color." },
            { trans: "vector", shape: "helical", env: "enveloped", genome: "dna", name: "Baculovirus", desc: "A pathogen used as a biological pesticide against caterpillars." },
            { trans: "vector", shape: "icosa", env: "enveloped", genome: "dna", name: "Asfarvirus", desc: "The family containing African Swine Fever Virus." },
            { trans: "vector", shape: "helical", env: "naked", genome: "dna", name: "Spiroplasma Phage", desc: "Infects bacteria found in the guts of insects." },
            { trans: "water", shape: "icosa", env: "naked", genome: "rna", name: "Norovirus", desc: "The 'winter vomiting bug'. Extremely contagious and hardy in water systems." },
            { trans: "water", shape: "icosa", env: "naked", genome: "dna", name: "Adenovirus 41", desc: "A specific strain of adenovirus adapted to the gut, causing diarrhea." },
            { trans: "water", shape: "complex", env: "naked", genome: "dna", name: "Cholera Phage", desc: "A bacteriophage that kills Vibrio cholerae bacteria in contaminated water." },
            { trans: "water", shape: "icosa", env: "enveloped", genome: "rna", name: "Hepatitis E", desc: "A liver infection transmitted via contaminated water in developing regions." },
            { trans: "water", shape: "icosa", env: "enveloped", genome: "dna", name: "Cyprinid Herpesvirus", desc: "A lethal virus affecting Koi and Carp populations in ponds." },
            { trans: "water", shape: "helical", env: "enveloped", genome: "rna", name: "Infectious Salmon Anemia", desc: "An orthomyxovirus affecting farmed Atlantic Salmon." },
            { trans: "water", shape: "bullet", env: "enveloped", genome: "rna", name: "VHS Virus", desc: "Viral Hemorrhagic Septicemia. A deadly fish pathogen." },
            { trans: "water", shape: "filament", env: "enveloped", genome: "rna", name: "Ebola (Theoretical)", desc: "Hypothetical scenario: Survival in liquid media." },
            { trans: "water", shape: "complex", env: "enveloped", genome: "dna", name: "Mimivirus", desc: "A giant virus found in amoebas in water cooling towers." },
            { trans: "water", shape: "helical", env: "naked", genome: "dna", name: "Halovirus", desc: "Infects halophilic archaea in high-salt water environments." },
            { trans: "water", shape: "bullet", env: "naked", genome: "rna", name: "Orchid Fleck (Water)", desc: "Can spread via hydroponic water systems." },
            { trans: "water", shape: "filament", env: "naked", genome: "dna", name: "Thermoproteus Virus", desc: "Found in boiling acidic water vents." },
            { trans: "water", shape: "icosa", env: "enveloped", genome: "dna", name: "Ranavirus", desc: "A major threat to amphibian populations worldwide." },
            { trans: "water", shape: "helical", env: "enveloped", genome: "dna", name: "Nimavirus", desc: "Causes White Spot Syndrome in shrimp." },
            { trans: "contact", shape: "icosa", env: "naked", genome: "dna", name: "HPV", desc: "Human Papillomavirus. Transmitted via skin-to-skin contact. Causes warts." },
            { trans: "contact", shape: "helical", env: "naked", genome: "rna", name: "Potato Virus X", desc: "Spreads between plants by direct contact of leaves or tools." },
            { trans: "contact", shape: "icosa", env: "naked", genome: "rna", name: "Enterovirus D68", desc: "A respiratory virus that can spread via surface contact." },
            { trans: "contact", shape: "helical", env: "enveloped", genome: "dna", name: "Epstein-Barr", desc: "Causes Infectious Mononucleosis. Spread via saliva sharing." },
            { trans: "contact", shape: "bullet", env: "naked", genome: "rna", name: "Mushroom Bacilliform", desc: "Infects mushrooms via direct mycelial contact." },
            { trans: "contact", shape: "filament", env: "naked", genome: "dna", name: "Lipothrixvirus", desc: "Infects thermophilic archaea. Extremely stable structure." },
            { trans: "contact", shape: "complex", env: "enveloped", genome: "dna", name: "Molluscum Contagiosum", desc: "A poxvirus causing mild skin lesions. Spread by direct contact." },
            { trans: "contact", shape: "helical", env: "enveloped", genome: "rna", name: "Nipah Virus", desc: "Transmitted via contact with infected bats, pigs, or their fluids." },
            { trans: "contact", shape: "icosa", env: "enveloped", genome: "dna", name: "Hepatitis B", desc: "Bloodborne. Chronic liver infection." },
            { trans: "contact", shape: "helical", env: "naked", genome: "dna", name: "Inovirus", desc: "A filamentous bacteriophage that causes chronic infection in bacteria." },
            { trans: "contact", shape: "bullet", env: "enveloped", genome: "dna", name: "Bacillus Phage", desc: "A rare DNA virus with a bullet shape infecting bacteria." }
        ];

        // --- SCENE ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x000000, 0.04);

        const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 100);
        camera.position.z = 12;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.8;

        // --- LIGHTING ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.1));
        const keyLight = new THREE.DirectionalLight(0xffffff, 1.5); keyLight.position.set(5, 5, 10); scene.add(keyLight);
        const rimLight = new THREE.SpotLight(0x0088ff, 8); rimLight.position.set(-10, 5, -10); rimLight.lookAt(0,0,0); scene.add(rimLight);
        const fillLight = new THREE.PointLight(0xffaa00, 1); fillLight.position.set(5, -10, 5); scene.add(fillLight);

        const virusGroup = new THREE.Group();
        scene.add(virusGroup);

        // --- MATERIALS ---
        const matCapsid = new THREE.MeshStandardMaterial({ color: 0x2a3b4c, roughness: 0.5, metalness: 0.4 });
        const matEnv = new THREE.MeshPhysicalMaterial({ 
            color: 0x88ccff, transparent: true, opacity: 0.25, transmission: 0.4, roughness: 0.2, 
            clearcoat: 1.0, side: THREE.DoubleSide, depthWrite: false
        });
        const matSpike = new THREE.MeshStandardMaterial({ color: 0xcc4444, roughness: 0.5 }); // Dark Red
        const matDNA = new THREE.MeshBasicMaterial({ color: 0x44ffaa, wireframe: true }); 
        const matRNA = new THREE.MeshBasicMaterial({ color: 0xffaa44, wireframe: true });

        // --- BUILDER (FIXED) ---
        window.updateModel = function() {
            while(virusGroup.children.length > 0) virusGroup.remove(virusGroup.children[0]);
            
            const shape = document.getElementById('shape').value;
            const env = document.getElementById('envelope').value;
            const genome = document.getElementById('genome').value;

            // 1. GENOME
            const gMat = (genome === 'dna') ? matDNA : matRNA;
            const coil = new THREE.Mesh(new THREE.TorusKnotGeometry(0.5, 0.15, 100, 16), gMat);
            if(shape==='filament') { coil.scale.set(0.3,0.3,1.5); coil.position.x=0; } 
            else if(shape!=='complex') { coil.scale.set(0.5,0.5,2.0); coil.rotation.y=Math.PI/2; }
            if(shape!=='complex') virusGroup.add(coil);

            // 2. CAPSID & ENVELOPE
            let coreGeo, envGeo;

            if(shape === 'filament') {
                class WormCurve extends THREE.Curve {
                    getPoint(t) { return new THREE.Vector3( (t-0.5)*10, Math.sin(t*Math.PI*3)*1.5, Math.cos(t*Math.PI*2)*0.5 ); }
                }
                const path = new WormCurve();
                coreGeo = new THREE.TubeGeometry(path, 64, 0.6, 16, false);
                envGeo = new THREE.TubeGeometry(path, 64, 1.0, 16, false); 
            }
            else if(shape === 'complex') {
                const group = new THREE.Group();
                const h = new THREE.Mesh(new THREE.IcosahedronGeometry(1.2,1), matCapsid); h.position.y=1.5;
                const t = new THREE.Mesh(new THREE.CylinderGeometry(0.3,0.3,2.5), matCapsid); t.position.y=-0.5;
                const l = new THREE.Mesh(new THREE.ConeGeometry(1.5,0.5,6,1,true), matCapsid); l.position.y=-1.8; l.rotation.x=Math.PI;
                group.add(h); group.add(t); group.add(l);
                virusGroup.add(group);
                
                const envG = new THREE.Group();
                const eh = new THREE.Mesh(new THREE.IcosahedronGeometry(1.6,1), matEnv); eh.position.y=1.5;
                const et = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 0.8, 3.0), matEnv); et.position.y=-0.8;
                envG.add(eh); envG.add(et);
                if(env==='enveloped') virusGroup.add(envG);
            }
            else if(shape === 'icosa') {
                coreGeo = new THREE.IcosahedronGeometry(1.5, 1);
                envGeo = new THREE.SphereGeometry(2.0, 64, 64);
            } else if (shape === 'helical') {
                coreGeo = new THREE.CylinderGeometry(0.7, 0.7, 4, 32); coreGeo.rotateZ(Math.PI/2);
                envGeo = new THREE.CylinderGeometry(1.1, 1.1, 4.4, 32); envGeo.rotateZ(Math.PI/2);
            } else if (shape === 'bullet') {
                coreGeo = new THREE.CapsuleGeometry(0.8, 2, 4, 16); coreGeo.rotateZ(Math.PI/2);
                envGeo = new THREE.CapsuleGeometry(1.1, 2.3, 4, 16); envGeo.rotateZ(Math.PI/2);
            }

            if(shape !== 'complex') {
                const core = new THREE.Mesh(coreGeo, matCapsid);
                virusGroup.add(core);
            }

            // 3. ENVELOPE (Standard)
            if(env === 'enveloped' && shape !== 'complex') {
                const eMesh = new THREE.Mesh(envGeo, matEnv);
                virusGroup.add(eMesh);
            }

            // 4. SPIKES (Thorn - Pointing Out)
            if(env === 'enveloped') {
                const count = (shape==='filament') ? 100 : 70;
                for(let i=0; i<count; i++) {
                    const spike = new THREE.Mesh(new THREE.ConeGeometry(0.06, 0.6, 6), matSpike);
                    spike.geometry.translate(0, 0.3, 0);

                    if(shape==='icosa') {
                        const phi = Math.acos(-1+(2*i)/count), theta = Math.sqrt(count*Math.PI)*phi;
                        const pos = new THREE.Vector3().setFromSphericalCoords(2.0, phi, theta);
                        spike.position.copy(pos);
                        spike.lookAt(0,0,0); spike.rotateX(-Math.PI/2);
                    } 
                    else if (shape==='filament') {
                        // FIXED MATH: Calculate normal from curve derivative
                        const t = i/count;
                        const angle = t * Math.PI * 8;
                        const cx = (t-0.5)*10; 
                        const cy = Math.sin(t*Math.PI*3)*1.5;
                        const cz = Math.cos(t*Math.PI*2)*0.5;
                        
                        // Approximate tangent vector
                        const tx = 10; 
                        const ty = Math.cos(t*Math.PI*3)*1.5 * Math.PI*3;
                        const tz = -Math.sin(t*Math.PI*2)*0.5 * Math.PI*2;
                        const tangent = new THREE.Vector3(tx, ty, tz).normalize();
                        
                        // Create perpendicular vector (random rotation around tangent)
                        const up = new THREE.Vector3(0, 1, 0);
                        let normal = new THREE.Vector3().crossVectors(tangent, up).normalize();
                        if(normal.length() === 0) normal = new THREE.Vector3(0,0,1); // Fallback
                        
                        // Rotate normal around tangent to distribute around tube
                        normal.applyAxisAngle(tangent, angle);
                        
                        // Position = Point on curve + Normal * Radius
                        const pos = new THREE.Vector3(cx, cy, cz).add(normal.multiplyScalar(1.0)); // 1.0 is env radius
                        
                        spike.position.copy(pos);
                        // Look at position + normal (pointing away from core)
                        const target = pos.clone().add(normal);
                        spike.lookAt(target); 
                        spike.rotateX(Math.PI/2);
                    }
                    else if (shape==='complex') {
                        const phi = Math.acos(-1+(2*i)/30), theta = Math.sqrt(30*Math.PI)*phi;
                        const pos = new THREE.Vector3().setFromSphericalCoords(1.6, phi, theta);
                        pos.y += 1.5;
                        spike.position.copy(pos);
                        spike.lookAt(0, 1.5, 0); spike.rotateX(-Math.PI/2);
                    }
                    else {
                        const a = (i/count)*Math.PI*10, x = (i/count)*4-2;
                        spike.position.set(x, Math.cos(a)*1.1, Math.sin(a)*1.1); 
                        spike.lookAt(x,0,0); spike.rotateX(-Math.PI/2);
                    }
                    virusGroup.add(spike);
                }
            }
        };

        // --- RISK ENGINE ---
        let currentConfig = {};

        function calculateRisk(user) {
            let score = 0; let bsl = "BSL-2"; let r0 = 1.2;
            
            if(user.trans === 'air') { score+=50; r0=4.5; bsl="BSL-3"; } 
            else if(user.trans === 'vector') { score+=25; r0=1.5; }
            else if(user.trans === 'water') { score+=30; r0=2.0; }
            else { score+=10; r0=0.8; }
            
            if(user.genome === 'rna') { score+=20; } else { score+=10; }
            
            if(user.shape === 'filament') { score+=15; bsl="BSL-4"; }
            if(user.shape === 'complex') { score+=20; } 

            if(user.env === 'enveloped') { score+=10; }
            if(user.env === 'naked') { score+=20; }

            let level = "LOW";
            let color = "color-low";
            if(score > 40) { level = "MODERATE"; color = "color-med"; }
            if(score > 65) { level = "HIGH"; color = "color-high"; }

            return { score, level, color, r0, bsl };
        }

        window.analyzeVirus = function() {
            const user = {
                trans: document.getElementById('trans').value,
                shape: document.getElementById('shape').value,
                env: document.getElementById('envelope').value,
                genome: document.getElementById('genome').value
            };
            currentConfig = user;
            controls.autoRotate = false;

            const match = VIRUS_DB.find(v => v.trans===user.trans && v.shape===user.shape && v.env===user.env && v.genome===user.genome);
            const risk = calculateRisk(user);

            document.getElementById('risk-val-text').innerText = risk.level;
            document.getElementById('risk-val-text').style.color = (risk.level==="HIGH" ? "#d00" : (risk.level==="MODERATE"?"#fa0":"#fff"));
            document.getElementById('r0-val').innerText = risk.r0;
            document.getElementById('bsl-val').innerText = risk.bsl;
            
            const bar = document.getElementById('risk-bar');
            bar.className = "progress-fill " + risk.color;
            setTimeout(() => { bar.style.width = Math.min(risk.score, 100) + "%"; }, 100);

            const overlay = document.getElementById('overlay');
            const statusText = document.getElementById('status-text');
            const indicator = document.getElementById('dot-indicator');
            const form = document.getElementById('discovery-form');
            const matchBtns = document.getElementById('match-buttons');
            const simBox = document.getElementById('sim-box');

            if(match) {
                indicator.className = "status-dot dot-match";
                statusText.innerText = "DATABASE MATCH CONFIRMED";
                statusText.style.color = "#0088ff";
                document.getElementById('res-title').innerText = match.name;
                document.getElementById('res-desc').innerText = match.desc;
                form.style.display = 'none';
                simBox.style.display = 'none';
                matchBtns.style.display = 'flex';
            } else {
                indicator.className = "status-dot dot-new";
                statusText.innerText = "NO DATABASE MATCH";
                statusText.style.color = "#ffaa00";
                document.getElementById('res-title').innerText = "UNKNOWN PATHOGEN";
                document.getElementById('res-desc').innerText = "Unique structural configuration detected.";
                
                let bestScore=0, bestMatch=VIRUS_DB[0];
                VIRUS_DB.forEach(v => {
                    let s = 0;
                    if(v.shape===user.shape) s+=40; if(v.env===user.env) s+=30;
                    if(v.genome===user.genome) s+=20; if(v.trans===user.trans) s+=10;
                    if(s > bestScore) { bestScore=s; bestMatch=v; }
                });

                simBox.style.display = 'block';
                document.getElementById('sim-text').innerText = `${bestMatch.name} (${bestScore}% Similarity)`;
                form.style.display = 'block';
                matchBtns.style.display = 'none';
            }
            overlay.style.display = 'flex';
        };

        window.saveNewVirus = function() {
            const name = document.getElementById('virus-name-input').value;
            if(!name) return;
            let vault = JSON.parse(localStorage.getItem('virusVault') || "[]");
            vault.push({ name: name, config: currentConfig });
            localStorage.setItem('virusVault', JSON.stringify(vault));
            renderVault();
            closeOverlay();
            document.getElementById('virus-name-input').value = "";
        };

        window.closeOverlay = function() {
            document.getElementById('overlay').style.display = 'none';
            controls.autoRotate = true;
        };

        window.renderVault = function() {
            const list = document.getElementById('vault-list');
            list.innerHTML = "";
            const vault = JSON.parse(localStorage.getItem('virusVault') || "[]");
            vault.forEach((v, idx) => {
                const item = document.createElement('div');
                item.className = 'vault-item';
                item.innerHTML = `<div class="v-name">${v.name}</div><div class="v-meta">${v.config.genome.toUpperCase()} | ${v.config.shape}</div>`;
                item.onclick = () => loadVirus(idx);
                list.appendChild(item);
            });
        };

        window.loadVirus = function(idx) {
            const vault = JSON.parse(localStorage.getItem('virusVault') || "[]");
            const v = vault[idx];
            document.getElementById('trans').value = v.config.trans;
            document.getElementById('shape').value = v.config.shape;
            document.getElementById('envelope').value = v.config.env;
            document.getElementById('genome').value = v.config.genome;
            updateModel();
        };

        function animate() { requestAnimationFrame(animate); controls.update(); renderer.render(scene, camera); }
        updateModel(); renderVault(); animate();
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });

    </script>
</body>
